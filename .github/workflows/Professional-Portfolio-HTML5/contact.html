<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Meta settings -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Unique title -->
    <title>Contact | Rad Motel</title>
</head>

<body>

    <!-- Header -->
    <header>
        <h1>Contact Rad Motel</h1>
        <p>We are ready to assist you anytime</p>
    </header>

    <!-- Navigation -->
    <nav>
        <a href="index.html">Home</a> |
        <a href="about.html">About</a> |
        <a href="gallery.html">Gallery</a> |
        <a href="data.html">Rates</a> |
        <a href="contact.html">Contact</a>
    </nav>

    <!-- Main content -->
    <main>

        <section>
            <h2>Booking / Inquiry Form</h2>

            <!-- Contact form -->
            <form action="#" method="post">

                <!-- Name -->
                <p>
                    <label for="name">Full Name:</label><br>
                    <input type="text" id="name" name="name" required>
                </p>

                <!-- Email -->
                <p>
                    <label for="email">Email Address:</label><br>
                    <input type="email" id="email" name="email" required>
                </p>

                <!-- Phone -->
                <p>
                    <label for="phone">Phone Number:</label><br>
                    <input type="tel" id="phone" name="phone" placeholder="+256700000000" required>
                </p>

                <!-- Message -->
                <p>
                    <label for="message">Message:</label><br>
                    <textarea id="message" name="message" rows="5" cols="30" required></textarea>
                </p>

                <!-- Submit -->
                <p>
                    <input type="submit" value="Send Message">
                </p>

            </form>

        </section>

        <!-- Extra contact details -->
        <aside>
            <h3>Visit Us</h3>
            <p>Kakiika, along Kyamugorani Road, Mbarara.</p>
            <p>Phone: +256 701 634372</p>
            <p>Email: info@radmotel.com</p>
        </aside>

    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 Rad Motel | Thank you for contacting us</p>
    </footer>

</body>

</html>
